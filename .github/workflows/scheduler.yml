name: Stock Titan Monitor

on:
  schedule:
    # Instead of */15, we tell it exactly which minutes of the hour to run
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:

jobs:
  check-news:
    runs-on: ubuntu-latest
    # Added this to prevent multiple runs from overlapping
    concurrency:
      group: news-monitor
      cancel-in-progress: true
      
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install feedparser requests
      - run: python monitor.py
      - name: Save Memory
        run: |
          git config --global user.name 'NewsBot'
          git config --global user.email 'bot@noreply.github.com'
          git add seen_articles.txt
          git commit -m "Update seen list [skip ci]" || echo "No changes"
          git push
